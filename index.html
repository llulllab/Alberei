  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root{
      --bg:#000000;
      --surface:#111111;
      --surface-elevated:#181818;
      --border:#222222;
      --border-light:#2a2a2a;
      --text-primary:#e8e4de;
      --text-secondary:#8a857e;
      --text-muted:#5a5650;
      --accent:#c9b99a;
      --accent-dim: rgba(201, 185, 154, 0.10);
      --accent-dim-2: rgba(201, 185, 154, 0.06);
    }

    html, body { height: 100%; }

    body{
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 1.5rem;
      min-height: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body::before{
      content:'';
      position: fixed;
      inset: 0;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      pointer-events:none;
    }

    .wrap{
      width: 100%;
      max-width: 720px;
      display:flex;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
      padding-top: 3rem;
      padding-bottom: 2rem;
      position: relative;
      z-index: 1;
    }

    h1{
      font-family: 'EB Garamond', serif;
      font-size: clamp(2.2rem, 5vw, 3.4rem);
      font-weight: 500;
      letter-spacing: 0.04em;
      line-height: 1;
      text-align: center;
      margin-top: 0.5rem;
    }

    .hero-gif{
      max-width: 220px;
      width: 50%;
      height: auto;
      margin: 0.2rem 0;
    }

    .grid{
      width: 100%;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.75rem;
      padding: 0.25rem;
    }

    .lang{
      display: block;
      text-decoration: none;
      background: var(--surface);
      border: 1px solid var(--border-light);
      color: var(--text-primary);
      padding: 0.9rem 0.85rem;
      text-align: center;
      transition: transform 0.12s ease, border-color 0.2s ease, background 0.2s ease;
      user-select: none;
      min-height: 72px;
      display:flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.25rem;
    }

    .lang:hover{
      border-color: var(--accent);
      background: var(--accent-dim-2);
      transform: translateY(-1px);
    }

    .code{
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 500;
    }

    .label{
      font-size: 1.0rem;
      letter-spacing: 0.01em;
      color: var(--text-primary);
      font-weight: 400;
      line-height: 1.15;
    }

    .label[dir="rtl"]{
      direction: rtl;
      unicode-bidi: plaintext;
    }

    .hint{
      margin-top: 0.2rem;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-align: center;
    }

    /* ── FOOTER ── */
    .site-footer{
      margin-top: 1.2rem;
      padding-top: 1.2rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      color: var(--text-muted);
    }

    .site-footer a{
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .site-footer a:hover{
      color: var(--accent);
    }

    .site-footer .sep{
      color: var(--border-light);
      user-select: none;
    }

    /* Responsive */
    @media (max-width: 820px){
      .grid{ grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    @media (max-width: 520px){
      body{ padding: 1rem; }
      .wrap{ padding-top: 1.5rem; gap: 1.1rem; }
      .hero-gif{ max-width: 150px; }
      .grid{ grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 0.65rem; }
      .lang{ min-height: 68px; padding: 0.85rem 0.75rem; }
      .site-footer{ font-size: 0.65rem; gap: 0.35rem; }
    }

    @media (prefers-reduced-motion: reduce){
      .lang{ transition: none; }
      .lang:hover{ transform: none; }
    }
  </style>
</head>
